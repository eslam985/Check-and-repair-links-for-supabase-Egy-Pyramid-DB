name: Links Watcher System

on:
  schedule:
    - cron: "0 0 * * *" # هيشتغل كل يوم الساعة 12 بالليل بتوقيت جرينتش
  workflow_dispatch: # زرار تشغيل يدوي لو حبيت تجربه في أي وقت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Link Watcher
        env:
          # سحب المفاتيح من الـ Secrets بأمان
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VOE_API_KEY: ${{ secrets.VOE_API_KEY }}
          LULUSTREAM_API_KEY: ${{ secrets.LULUSTREAM_API_KEY }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          DOOD_API_KEY: ${{ secrets.DOOD_API_KEY }}
          STREAMTAPE_API_KEY: ${{ secrets.STREAMTAPE_API_KEY }}
          MIXDROP_API_KEY: ${{ secrets.MIXDROP_API_KEY }}
          MIXDROP_EMAIL: ${{ secrets.MIXDROP_EMAIL }}
        run: python watcher.py
